  <head>
    <META charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <style>
      .box{
        /* 页面整体居中 */
        max-width: 800px;
        margin: 50px auto;
        padding: 30px;
        /* 圆角卡片效果 */
        border-radius: 16px;
        background: #f8f9fa;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        /* 链接自动换行排版 */
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
      }
      /* 链接样式美化 */
      .box a {
        padding: 10px 20px;
        background: #ffffff;
        color: #2c3e50;
        border-radius: 8px;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        transition: all 0.3s ease;
        border: 1px solid #e1e4e8;
      }
      /* 鼠标悬浮效果 */
      .box a:hover {
        background: #409eff;
        color: #fff;
        transform: translateY(-2px);
        box-shadow: 0 3px 8px rgba(64,158,255,0.3);
        border-color: #409eff;
      }
    </style>
  </head>
