<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>自定义等分数量+上下左右边距+Logo自适应缩放+上传下载</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            padding: 30px;
            font-family: system-ui, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
        }
        .control-box {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .row-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .control-box label {
            font-size: 16px;
        }
        .px-input {
            width: 140px;
            padding: 8px;
            font-size: 16px;
        }
        .num-input {
            width: 80px;
            padding: 8px;
            font-size: 16px;
        }
        .tip-text {
            font-size: 14px;
            color: #666;
        }
        #downloadBtn {
            padding: 8px 16px;
            font-size: 16px;
            cursor: pointer;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
        }
        #downloadBtn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .drop-box {
            width: 100%;
            height: 180px;
            border: 3px dashed #666;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #555;
            margin-bottom: 30px;
            transition: 0.2s;
            cursor: pointer;
        }
        .drop-box.active {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .result-title {
            font-size: 18px;
            margin: 20px 0 12px;
            color: #333;
        }
        .slice-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .slice-item {
            border: 1px solid #ddd;
            padding: 4px;
            text-align: center;
        }
        .slice-item p {
            margin-bottom: 6px;
            font-size: 14px;
        }
        .slice-item img {
            display: block;
            max-height: 320px;
        }
        canvas {
            display: none;
        }
        #imgLogo {
            display: none;
        }
        #fileInput {
            display: none;
        }
    </style>
</head>
<body>
    <img id="imgLogo" src="logo.png" alt="logo">
    <input type="file" id="fileInput" accept="image/*">

    <div class="control-box">
        <div class="row-group">
            <label>切分成几等份：</label>
            <input class="num-input" type="number" id="splitCountInput" min="1" value="4">
            <span class="tip-text">默认4，最少1份</span>
        </div>
        <div class="row-group">
            <label>左右边距像素：</label>
            <input class="px-input" type="number" id="cutPxInput" placeholder="正数裁剪 / 负数加白边" value="">
            <span class="tip-text">正数=裁左右；负数=加左右白边</span>
        </div>
        <div class="row-group">
            <label>上下边距像素：</label>
            <input class="px-input" type="number" id="verticalPxInput" placeholder="正数裁剪 / 负数加白边" value="">
            <span class="tip-text">正数=裁上下；负数=加上下白边</span>
        </div>
        <button id="downloadBtn" disabled>批量下载图片</button>
    </div>

    <div class="drop-box" id="dropArea">
        将图片拖拽到此处 或 点击区域上传图片
    </div>

    <h3 class="result-title">切割后图片：</h3>
    <div class="slice-wrap" id="resultBox"></div>

    <canvas id="canvas"></canvas>
    <script>
        const dropArea = document.getElementById('dropArea');
        const resultBox = document.getElementById('resultBox');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cutPxInput = document.getElementById('cutPxInput');
        const verticalPxInput = document.getElementById('verticalPxInput');
        const splitCountInput = document.getElementById('splitCountInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const logoImg = document.getElementById('imgLogo');
        const fileInput = document.getElementById('fileInput');

        let sliceUrls = [];

        // 读取本地存储数值
        const savedHoriz = localStorage.getItem('horizValue');
        const savedVert = localStorage.getItem('vertValue');
        const savedSplitNum = localStorage.getItem('splitNum');
        if (savedHoriz !== null) cutPxInput.value = savedHoriz;
        if (savedVert !== null) verticalPxInput.value = savedVert;
        if (savedSplitNum !== null) splitCountInput.value = savedSplitNum;

        // 输入变化自动保存到本地存储
        cutPxInput.addEventListener('input', () => localStorage.setItem('horizValue', cutPxInput.value));
        verticalPxInput.addEventListener('input', () => localStorage.setItem('vertValue', verticalPxInput.value));
        splitCountInput.addEventListener('input', () => localStorage.setItem('splitNum', splitCountInput.value));

        // 点击唤起文件选择
        dropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) {
                alert('请选择图片文件！');
                return;
            }
            loadImage(file);
        });

        // 拖拽阻止默认行为
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
            dropArea.addEventListener(evt, e => e.preventDefault());
        });
        ['dragenter', 'dragover'].forEach(evt => dropArea.addEventListener(evt, () => dropArea.classList.add('active')));
        ['dragleave', 'drop'].forEach(evt => dropArea.addEventListener(evt, () => dropArea.classList.remove('active')));

        dropArea.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (!file || !file.type.startsWith('image/')) {
                alert('请拖拽图片文件！');
                return;
            }
            loadImage(file);
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => splitImageFour(img);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        function splitImageFour(sourceImg) {
            resultBox.innerHTML = '';
            sliceUrls = [];
            downloadBtn.disabled = true;

            const fullW = sourceImg.width;
            const fullH = sourceImg.height;
            const horizVal = parseInt(cutPxInput.value) || 0;
            const vertVal = parseInt(verticalPxInput.value) || 0;
            let splitCount = parseInt(splitCountInput.value) || 4;
            // 限制最小份数为1
            if (splitCount < 1) splitCount = 1;

            // ========== 水平（左右）处理 ==========
            let cropLeft, cropRight, finalDrawW;
            if (horizVal > 0) {
                // 正数：左右各裁剪N像素
                if (horizVal * 2 >= fullW) {
                    alert('左右裁剪像素过大，总和不能超过图片宽度！');
                    return;
                }
                cropLeft = horizVal;
                cropRight = fullW - horizVal;
                finalDrawW = fullW - horizVal * 2;
            } else if (horizVal < 0) {
                // 负数：左右各加白边
                const addWhite = Math.abs(horizVal);
                cropLeft = -addWhite;
                cropRight = fullW + addWhite;
                finalDrawW = fullW + addWhite * 2;
            } else {
                // 0 无处理
                cropLeft = 0;
                cropRight = fullW;
                finalDrawW = fullW;
            }

            // ========== 垂直（上下）处理 ==========
            let cropTop, cropBottom, finalDrawH;
            if (vertVal > 0) {
                if (vertVal * 2 >= fullH) {
                    alert('上下裁剪像素过大，总和不能超过图片高度！');
                    return;
                }
                cropTop = vertVal;
                cropBottom = fullH - vertVal;
                finalDrawH = fullH - vertVal * 2;
            } else if (vertVal < 0) {
                const addWhite = Math.abs(vertVal);
                cropTop = -addWhite;
                cropBottom = fullH + addWhite;
                finalDrawH = fullH + addWhite * 2;
            } else {
                cropTop = 0;
                cropBottom = fullH;
                finalDrawH = fullH;
            }

            const sliceW = finalDrawW / splitCount;

            logoImg.onload = renderAllSlices;
            if (logoImg.complete) renderAllSlices();

            function renderAllSlices() {
                for (let i = 0; i < splitCount; i++) {
                    canvas.width = sliceW;
                    canvas.height = finalDrawH;
                    // 填充白色底色（白边依赖白色背景）
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    // 计算当前切片对应的原图X区间
                    const sliceGlobalStartX = i * sliceW;
                    const sliceGlobalEndX = (i + 1) * sliceW;

                    // 正确绘制原图（修复左右偏移bug）
                    ctx.drawImage(
                        sourceImg,
                        // 原图截取区域：左右裁剪后的有效区间
                        cropLeft, cropTop,
                        cropRight - cropLeft, cropBottom - cropTop,
                        // 画布绘制位置：对齐当前切片全局坐标
                        -sliceGlobalStartX, 0,
                        finalDrawW, finalDrawH
                    );

                    // Logo规则：宽度为当前切片宽度1/8，等比例缩放高度
                    const logoDrawW = sliceW / 5;
                    const logoDrawH = logoDrawW * logoImg.height / logoImg.width;

                    // 第一张左上角Logo
                    if (i === 0) {
                        ctx.drawImage(logoImg, 0, 10, logoDrawW, logoDrawH);
                    }
                    // 最后一张右下角Logo
                    if (i === splitCount - 1) {
                        const logoX = sliceW - logoDrawW;
                        const logoY = finalDrawH - logoDrawH;
                        ctx.drawImage(logoImg, logoX, logoY-10, logoDrawW, logoDrawH);
                    }

                    const sliceUrl = canvas.toDataURL('image/png');
                    sliceUrls.push(sliceUrl);

                    const imgDom = document.createElement('img');
                    imgDom.src = sliceUrl;
                    const wrap = document.createElement('div');
                    wrap.className = 'slice-item';
                    const numStr = String(i + 1).padStart(2, '0');
                    wrap.innerHTML = `<p>第${numStr}块 (宽${Math.round(sliceW)}px 高${Math.round(finalDrawH)}px)</p>`;
                    wrap.appendChild(imgDom);
                    resultBox.appendChild(wrap);
                }
                downloadBtn.disabled = false;
            }
        }

        // 批量下载，自动按 01.png 02.png ... 命名
        downloadBtn.addEventListener('click', () => {
            if (sliceUrls.length === 0) return;
            sliceUrls.forEach((url, index) => {
                const a = document.createElement('a');
                a.href = url;
                const fileName = String(index + 1).padStart(2, '0') + '.png';
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        });
    </script>
</body>
</html>
