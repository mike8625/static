<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>基于左下角背景色 宫格自动分割工具（滑块防抖+Logo水印）</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            padding: 30px;
            font-family: system-ui, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
        }
        .control-bar {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="range"] {
            width: 180px;
        }
        button {
            padding: 8px 16px;
            font-size: 15px;
            cursor: pointer;
            background: #2266dd;
            color: #fff;
            border: none;
            border-radius: 6px;
        }
        button:disabled {
            background: #a0b4d8;
            cursor: not-allowed;
        }
        .drop-box {
            width: 100%;
            height: 200px;
            border: 3px dashed #777;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #555;
            margin-bottom: 25px;
            cursor: pointer;
        }
        .drop-box.active {
            border-color: #2266dd;
            background: #f0f7ff;
        }
        .info-text {
            color: #333;
            margin: 10px 0;
            font-size: 16px;
        }
        .result-wrap {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .slice-card {
            border: 1px solid #ddd;
            padding: 6px;
            text-align: center;
        }
        .slice-card p {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .slice-card img {
            max-height: 300px;
            display: block;
        }
        canvas {
            display: none;
        }
        #fileInput {
            display: none;
        }
        .bg-color-demo {
            width: 30px;
            height: 30px;
            border: 1px solid #333;
        }
        #logoImg {
            display: none;
        }
    </style>
</head>
<body>
    <!-- 隐藏Logo图片，同级logo.png -->
    <img id="logoImg" src="logo.png" alt="logo">

    <div class="control-bar">
        <div class="slider-group">
            <label>色差阈值(0~80):</label>
            <input type="range" id="diffSlider" min="0" max="80" value="30">
            <span id="diffVal">30</span>
        </div>
        <div class="slider-group">
            <span>识别基准背景色:</span>
            <div class="bg-color-demo" id="bgColorBox"></div>
        </div>
        <button id="downloadAllBtn" disabled>批量下载全部切片</button>
        <span class="info-text" id="tipInfo">上传图片，自动取左下角作为分隔背景色</span>
    </div>

    <div class="drop-box" id="dropArea">
        拖拽图片到此处 / 点击上传图片
    </div>

    <div class="info-text">提取结果：</div>
    <div class="result-wrap" id="resultBox"></div>

    <input type="file" id="fileInput" accept="image/*">
    <canvas id="mainCanvas"></canvas>

    <script>
        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const resultBox = document.getElementById('resultBox');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const tipInfo = document.getElementById('tipInfo');
        const diffSlider = document.getElementById('diffSlider');
        const diffVal = document.getElementById('diffVal');
        const bgColorBox = document.getElementById('bgColorBox');
        const logoImg = document.getElementById('logoImg');

        let sliceImgUrls = [];
        let currentImage = null;
        let baseBg = { r: 255, g: 255, b: 255 };
        let colorDiffThreshold = 30;
        const MIN_PIECE_SIZE = 30;
        // 防抖定时器
        let sliderDebounceTimer = null;
        const DEBOUNCE_DELAY = 300;

        // 滑块防抖监听
        diffSlider.addEventListener('input', () => {
            // 实时更新数字显示，不防抖
            colorDiffThreshold = Number(diffSlider.value);
            diffVal.textContent = colorDiffThreshold;

            // 清除上次定时器，延迟执行分割
            clearTimeout(sliderDebounceTimer);
            sliderDebounceTimer = setTimeout(() => {
                if (currentImage) splitByBgColor(currentImage);
            }, DEBOUNCE_DELAY);
        });

        // 拖拽上传逻辑
        ['dragenter','dragover','dragleave','drop'].forEach(evt => dropArea.addEventListener(evt, e=>e.preventDefault()));
        ['dragenter','dragover'].forEach(evt => dropArea.addEventListener(evt, ()=>dropArea.classList.add('active')));
        ['dragleave','drop'].forEach(evt => dropArea.addEventListener(evt, ()=>dropArea.classList.remove('active')));

        dropArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) {
                alert('请选择图片文件！');
                return;
            }
            loadImage(file);
        });
        dropArea.addEventListener('drop', e => {
            const file = e.dataTransfer.files[0];
            if (!file || !file.type.startsWith('image/')) {
                alert('请拖拽图片文件！');
                return;
            }
            loadImage(file);
        });

        // 加载图片
        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => {
                    currentImage = img;
                    splitByBgColor(img);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        // 计算两个RGB颜色的欧几里得色差
        function getColorDistance(r1,g1,b1,r2,g2,b2) {
            const dr = r1 - r2;
            const dg = g1 - g2;
            const db = b1 - b2;
            return Math.sqrt(dr*dr + dg*dg + db*db);
        }

        // 判断当前像素是否属于分隔背景
        function isBackgroundPixel(r,g,b) {
            const dist = getColorDistance(r,g,b, baseBg.r, baseBg.g, baseBg.b);
            return dist < colorDiffThreshold;
        }

        function splitByBgColor(sourceImg) {
            resultBox.innerHTML = '';
            sliceImgUrls = [];
            downloadAllBtn.disabled = true;
            tipInfo.textContent = "正在读取左下角背景色...";

            const W = sourceImg.width;
            const H = sourceImg.height;
            canvas.width = W;
            canvas.height = H;
            ctx.drawImage(sourceImg, 0, 0);
            const imgData = ctx.getImageData(0, 0, W, H);
            const data = imgData.data;

            // 1. 提取图片【左下角】像素作为基准背景色
            const leftBottomX = 0;
            const leftBottomY = H - 1;
            const bgIdx = (leftBottomY * W + leftBottomX) * 4;
            baseBg.r = data[bgIdx];
            baseBg.g = data[bgIdx+1];
            baseBg.b = data[bgIdx+2];
            // 预览背景色块
            bgColorBox.style.backgroundColor = `rgb(${baseBg.r},${baseBg.g},${baseBg.b})`;

            tipInfo.textContent = `基准背景 RGB(${baseBg.r},${baseBg.g},${baseBg.b})，色差阈值${colorDiffThreshold}`;

            // 2. 纵向扫描：标记存在画面内容的行
            const rowHasContent = new Array(H).fill(false);
            for (let y = 0; y < H; y++) {
                for (let x = 0; x < W; x++) {
                    const idx = (y * W + x) * 4;
                    const r = data[idx], g = data[idx+1], b = data[idx+2];
                    if (!isBackgroundPixel(r,g,b)) {
                        rowHasContent[y] = true;
                        break;
                    }
                }
            }

            // 合并连续有效纵向区块
            const verticalBlocks = [];
            let currY = null;
            for (let y = 0; y < H; y++) {
                if (rowHasContent[y]) {
                    if (currY === null) currY = y;
                } else {
                    if (currY !== null) {
                        verticalBlocks.push({ y1: currY, y2: y - 1 });
                        currY = null;
                    }
                }
            }
            if (currY !== null) verticalBlocks.push({ y1: currY, y2: H - 1 });

            // 3. 横向扫描，分割每一行纵向区块里的子图
            const allPieces = [];
            for (const vBlock of verticalBlocks) {
                const { y1, y2 } = vBlock;
                const colHasContent = new Array(W).fill(false);
                // 遍历当前纵向区域所有列
                for (let x = 0; x < W; x++) {
                    for (let y = y1; y <= y2; y++) {
                        const idx = (y * W + x) * 4;
                        const r = data[idx], g = data[idx+1], b = data[idx+2];
                        if (!isBackgroundPixel(r,g,b)) {
                            colHasContent[x] = true;
                            break;
                        }
                    }
                }
                // 合并连续内容列
                let currX = null;
                for (let x = 0; x < W; x++) {
                    if (colHasContent[x]) {
                        if (currX === null) currX = x;
                    } else {
                        if (currX !== null) {
                            const w = x - currX;
                            const h = y2 - y1;
                            if (w > MIN_PIECE_SIZE && h > MIN_PIECE_SIZE) {
                                allPieces.push({
                                    x1: currX, x2: x - 1,
                                    y1: y1, y2: y2
                                });
                            }
                            currX = null;
                        }
                    }
                }
                // 最后一块
                if (currX !== null) {
                    const w = W - currX;
                    const h = y2 - y1;
                    if (w > MIN_PIECE_SIZE && h > MIN_PIECE_SIZE) {
                        allPieces.push({
                            x1: currX, x2: W - 1,
                            y1: y1, y2: y2
                        });
                    }
                }
            }

            tipInfo.textContent += ` | 识别出 ${allPieces.length} 张子图`;
            if (allPieces.length === 0) {
                alert("未识别到子图，请调大色差阈值（拖动滑块向右）");
                return;
            }

            // 等待logo加载完成再绘制切片
            function renderAllSlices() {
                const totalPieces = allPieces.length;
                allPieces.forEach((rect, idx) => {
                    const { x1, x2, y1, y2 } = rect;
                    const pw = x2 - x1 + 1;
                    const ph = y2 - y1 + 1;
                    const tempCanvas = document.createElement('canvas');
                    const tCtx = tempCanvas.getContext('2d');
                    tempCanvas.width = pw;
                    tempCanvas.height = ph;
                    // 绘制原图切片
                    tCtx.drawImage(
                        sourceImg,
                        x1, y1, pw, ph,
                        0, 0, pw, ph
                    );

                    // Logo尺寸：宽度为切片宽度1/8，等比例缩放高度
                    const logoW = pw / 5;
                    const logoH = logoW * logoImg.height / logoImg.width;

                    // 第一张左上角绘制logo
                    if (idx === 0) {
                        tCtx.drawImage(logoImg, 0, 10, logoW, logoH);
                    }
                    // 最后一张右下角绘制logo
                    if (idx === totalPieces - 1) {
                        const drawX = pw - logoW;
                        const drawY = ph - logoH;
                        tCtx.drawImage(logoImg, drawX, drawY-10, logoW, logoH);
                    }

                    const url = tempCanvas.toDataURL('image/png');
                    sliceImgUrls.push(url);

                    const card = document.createElement('div');
                    card.className = 'slice-card';
                    const num = String(idx + 1).padStart(2, '0');
                    card.innerHTML = `<p>第${num}块 ${pw}×${ph}</p>`;
                    const img = document.createElement('img');
                    img.src = url;
                    card.appendChild(img);
                    resultBox.appendChild(card);
                });

                downloadAllBtn.disabled = false;
            }

            // 兼容logo缓存/未加载
            if (logoImg.complete && logoImg.naturalWidth > 0) {
                renderAllSlices();
            } else {
                logoImg.onload = renderAllSlices;
            }
        }

        // 批量下载切片
        downloadAllBtn.addEventListener('click', () => {
            sliceImgUrls.forEach((url, i) => {
                const a = document.createElement('a');
                a.href = url;
                a.download = String(i+1).padStart(2, '0') + '.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        });
    </script>
</body>
</html>
